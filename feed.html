<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00FFF7">
  <meta name="description" content="Respawn Social — La red social para gamers">
  <link rel="manifest" href="manifest.json">
  <title>Respawn — Feed</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Navbar ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,15,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 32px; display: flex; align-items: center;
      justify-content: space-between; height: 56px;
    }
    .nav-left  { display: flex; align-items: center; gap: 32px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .navbar-brand { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--cyan); letter-spacing: 3px; text-decoration: none; text-shadow: 0 0 16px rgba(0,255,247,0.6); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); text-decoration: none; padding: 6px 14px; border-radius: var(--radius-md); border: 1px solid transparent; transition: all 0.2s; }
    .nav-link:hover { color: var(--text-primary); border-color: var(--border-default); }
    .nav-link.active { color: var(--cyan); border-color: rgba(0,255,247,0.3); background: rgba(0,255,247,0.06); }
    .nav-icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-default); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; position: relative; transition: border-color 0.2s; text-decoration: none; color: inherit; }
    .nav-icon-btn:hover { border-color: var(--cyan); }
    .nav-notif { position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; background: var(--pink); border-radius: 50%; border: 2px solid var(--bg-void); }
    .btn-logout { background: transparent; border: 1px solid rgba(255,79,123,0.4); color: var(--pink); padding: 6px 14px; border-radius: var(--radius-md); font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { background: var(--pink-glow); border-color: var(--pink); }

    /* ── Notif panel ── */
    #notifPanel { display:none; position:fixed; top:64px; right:16px; width:320px; background:var(--bg-card); border:1px solid var(--border-default); border-radius:var(--radius-lg); z-index:150; box-shadow:0 16px 48px rgba(0,0,0,0.6); overflow:hidden; }

    /* ── Layout ── */
    .feed-layout-wrapper { max-width: 1100px; margin: 0 auto; padding: 24px 16px; display: flex; gap: 24px; align-items: flex-start; }

    /* ── Main content ── */
    #mainContent { flex: 1; max-width: 640px; min-width: 0; display: flex; flex-direction: column; gap: 0; }

    /* ── Composer ── */
    .post-composer {
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .post-composer::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--cyan-dim), var(--purple-dim), var(--pink-dim)); }
    .composer-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .composer-av { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--cyan-dim); image-rendering: pixelated; flex-shrink: 0; }
    .composer-meta { display: flex; flex-direction: column; gap: 2px; }
    .composer-name { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--cyan); letter-spacing: 0.5px; }
    .composer-hint { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .composer-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .char-counter { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .char-counter.warn   { color: #ffaa00; }
    .char-counter.danger { color: var(--pink); }
    #postContent { min-height: 72px; }

    /* ── Posts ── */
    .post {
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); padding: 18px 20px;
      margin-bottom: 12px; position: relative; overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeInUp 0.2s ease forwards;
    }
    .post::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent); opacity: 0; transition: opacity 0.2s; }
    .post:hover { border-color: rgba(0,255,247,0.2); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    .post:hover::before { opacity: 1; }
    .post p { margin: 10px 0; line-height: 1.6; color: var(--text-primary); font-size: 15px; font-family: var(--font-body); }

    /* Post header */
    .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .post-author { display: flex; align-items: center; gap: 10px; }
    .post-av { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border-default); image-rendering: pixelated; flex-shrink: 0; }
    .post-author-info { display: flex; flex-direction: column; gap: 2px; }
    .post-author-name { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.5px; }
    .post-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

    /* Game tag en posts */
    .post-game-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,255,247,0.08); border: 1px solid rgba(0,255,247,0.2); border-radius: 20px; padding: 2px 8px; font-family: var(--font-display); font-size: 9px; font-weight: 700; color: var(--cyan); letter-spacing: 0.5px; margin-left: 6px; }

    /* Post footer */
    .post-footer { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
    .post-footer span { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .post-actions { display: flex; align-items: center; gap: 8px; }
    .post-image { width:100%; max-height:400px; object-fit:cover; border-radius:10px; margin:10px 0; border:1px solid var(--border-subtle); cursor:pointer; display:block; }
    .post-click-area { cursor:pointer; }
    .post-click-area:hover .post-content-text { color: var(--text-primary); }
    .view-thread-btn { font-family:var(--font-mono);font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:0;transition:color 0.2s; }
    .view-thread-btn:hover { color:var(--cyan); }

    /* Follow buttons */
    .btn-follow-sm { padding: 5px 12px; font-size: 11px; margin: 0; letter-spacing: 1px; }
    .btn-unfollow-sm { padding: 5px 12px; font-size: 11px; margin: 0; background: transparent; border: 1px solid var(--purple-dim); color: var(--purple); border-radius: var(--radius-md); font-family: var(--font-display); font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .btn-unfollow-sm:hover { background: var(--purple-glow); }

    /* Empty feed */
    .empty-feed { text-align: center; padding: 60px 20px; background: var(--bg-card); border: 1px dashed var(--border-default); border-radius: var(--radius-lg); }
    .empty-feed-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; display: block; }
    .empty-feed h3 { font-family: var(--font-display); font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 1px; }
    .empty-feed p  { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }

    /* ── Sidebar ── */
    #sidebar { width: 300px; flex-shrink: 0; position: sticky; top: 76px; display: flex; flex-direction: column; gap: 12px; }

    .sidebar-card { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 18px; }
    .sidebar-card-title { font-family: var(--font-display); font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

    /* Mini perfil en sidebar */
    .sidebar-profile { display: flex; align-items: center; gap: 12px; padding: 4px 0 14px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 14px; }
    .sidebar-av { width: 44px; height: 44px; border-radius: 10px; border: 2px solid var(--cyan-dim); image-rendering: pixelated; display: block; box-shadow: 0 0 12px var(--cyan-glow); }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-username { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--cyan); letter-spacing: 0.5px; }
    .sidebar-level { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .sidebar-xp-mini { height: 3px; background: var(--bg-surface); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .sidebar-xp-fill { height: 100%; background: linear-gradient(90deg, var(--purple-dim), var(--cyan)); border-radius: 2px; transition: width 1s ease; }

    /* User items en sidebar */
    .user-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
    .user-item:last-child { border-bottom: none; padding-bottom: 0; }
    .user-info { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .user-av { width: 30px; height: 30px; border-radius: 8px; image-rendering: pixelated; border: 1px solid var(--border-default); flex-shrink: 0; }
    .user-name { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-bio-mini { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-follow-xs { padding: 4px 10px; font-size: 10px; margin: 0; white-space: nowrap; letter-spacing: 0.5px; }
    .btn-unfollow-xs { padding: 4px 10px; font-size: 10px; margin: 0; background: transparent; border: 1px solid var(--purple-dim); color: var(--purple); border-radius: var(--radius-sm); font-family: var(--font-display); font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-unfollow-xs:hover { background: var(--purple-glow); }
    .sidebar-empty { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 4px 0; }

    /* Arcade panel */
    .game-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-md); font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-primary); text-decoration: none; transition: all 0.2s; position: relative; overflow: hidden; margin-bottom: 8px; }
    .game-link:last-child { margin-bottom: 0; }
    .game-link::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--cyan); transform: scaleY(0); transition: transform 0.2s; }
    .game-link:hover { background: var(--bg-elevated); border-color: var(--cyan); color: var(--cyan); transform: translateX(3px); }
    .game-link:hover::before { transform: scaleY(1); }
    .game-link-icon { font-size: 16px; flex-shrink: 0; }
    .game-link-info { flex: 1; min-width: 0; }
    .game-link-name { display: block; }
    .game-link-status { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-top: 1px; display: block; }
    .game-lock { font-size: 12px; opacity: 0.5; }

    /* Trending tags */
    .trending-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .trending-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 4px 12px; font-family: var(--font-display); font-size: 10px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; }
    .trending-tag:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,255,247,0.06); }
    .trending-tag.hot { border-color: rgba(255,79,123,0.3); color: var(--pink); background: rgba(255,79,123,0.06); }

    @media(max-width:900px) { #sidebar { display:none; } .nav-links { display:none; } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <nav id="globalNav"></nav>

  <!-- Layout 2 columnas -->
  <div class="feed-layout-wrapper">

    <main id="mainContent">
      <!-- Composer -->
      <div class="post-composer">
        <div class="composer-top">
          <img id="composerAvatar" class="composer-av" src="" alt="avatar">
          <div class="composer-meta">
            <span class="composer-name" id="composerUsername"></span>
            <span class="composer-hint">Ctrl+Enter para publicar</span>
          </div>
        </div>
        <textarea id="postContent" class="input" placeholder="¿Qué estás jugando? ¿Qué pasó hoy?" rows="3" maxlength="280"></textarea>
        <!-- Preview imagen -->
        <div id="imagePreview" style="display:none;margin-top:10px;position:relative;">
          <img id="imagePreviewImg" style="max-width:100%;max-height:280px;border-radius:10px;border:1px solid var(--border-default);display:block;">
          <button onclick="removeImage()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">✕</button>
        </div>
        <div class="composer-footer">
          <div style="display:flex;align-items:center;gap:8px;">
            <label for="imageInput" style="cursor:pointer;font-size:18px;opacity:0.7;transition:opacity 0.2s;" title="Agregar imagen" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">🖼</label>
            <input type="file" id="imageInput" accept="image/*,image/gif" style="display:none;" onchange="previewImage(this)">
            <span class="char-counter" id="charCounter">0 / 280</span>
          </div>
          <button id="postBtn" class="btn" style="margin:0;">PUBLICAR</button>
        </div>
      </div>
      <!-- Posts -->
      <div id="postsContainer"></div>
    </main>

    <!-- Sidebar -->
    <aside id="sidebar">

      <!-- Mini perfil propio -->
      <div class="sidebar-card" id="sidebarProfileCard">
        <div class="sidebar-profile">
          <img id="sidebarAvatar" class="sidebar-av" src="" alt="">
          <div class="sidebar-user-info">
            <div class="sidebar-username" id="sidebarUsername"></div>
            <div class="sidebar-level"   id="sidebarLevel">LVL 1 · Novato</div>
            <div class="sidebar-xp-mini"><div class="sidebar-xp-fill" id="sidebarXpFill" style="width:0%"></div></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border-subtle);border-radius:var(--radius-sm);overflow:hidden;">
          <div style="background:var(--bg-surface);padding:10px 4px;text-align:center;">
            <div style="font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--cyan);" id="sbPosts">0</div>
            <div style="font-family:var(--font-body);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Posts</div>
          </div>
          <div style="background:var(--bg-surface);padding:10px 4px;text-align:center;border-left:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle);">
            <div style="font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--cyan);" id="sbFollowing">0</div>
            <div style="font-family:var(--font-body);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Siguiendo</div>
          </div>
          <div style="background:var(--bg-surface);padding:10px 4px;text-align:center;">
            <div style="font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--cyan);" id="sbFollowers">0</div>
            <div style="font-family:var(--font-body);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Seguidores</div>
          </div>
        </div>
      </div>

      <!-- Siguiendo -->
      <div class="sidebar-card" id="interactionPanel">
        <div class="sidebar-card-title cyan">👥 Siguiendo</div>
        <div id="followingList"></div>
        <div class="sidebar-card-title pink" style="margin-top:16px;">🔍 Descubrir</div>
        <div id="discoverUsers"></div>
      </div>

      <!-- Arcade -->
      <div class="sidebar-card" id="minigamesPanel">
        <div class="sidebar-card-title" style="color:var(--purple-dim);">🕹 Arcade</div>
        <div id="gamesList"></div>
      </div>

      <!-- Trending tags -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">🔥 Trending</div>
        <div class="trending-tags" id="trendingTags"></div>
      </div>

    </aside>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js?v=2"></script>
  <script src="navbar.js"></script>
  <script src="feed.js"></script>
</body>
</html>
