<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Respawn — Mapa de Aventura</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,15,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    .navbar-brand { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--cyan); letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 12px rgba(0,255,247,0.5); }
    .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: transparent; border: 1px solid var(--border-default); color: var(--text-secondary); border-radius: var(--radius-md); font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--cyan); color: var(--cyan); }

    .map-wrapper {
      max-width: 800px; margin: 32px auto 60px; padding: 0 16px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    .map-title {
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase;
      text-align: center;
    }

    #game-map {
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: 0 0 40px var(--cyan-glow), 0 0 0 1px var(--border-subtle);
      display: block;
      image-rendering: pixelated;
    }

    .map-hud {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; flex-wrap: wrap;
    }

    #map-instructions {
      font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary);
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 10px 20px;
      text-align: center; transition: border-color 0.3s, color 0.3s;
    }

    #map-instructions.active {
      border-color: var(--cyan); color: var(--cyan);
      box-shadow: 0 0 12px var(--cyan-glow);
    }

    #map-instructions.locked {
      border-color: var(--pink-dim); color: var(--pink);
    }

    .level-legend {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    }

    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    }

    .legend-dot {
      width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
    }

    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg-elevated); border: 1px solid var(--border-default);
      border-radius: 4px; padding: 2px 6px;
      font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
    }
    @media (max-width: 600px) {
    .game-wrapper { padding: 0 8px 180px; margin: 12px auto; }
    #game-map { width: 100% !important; height: auto !important; }
  }
</style>
</head>
<body>

  <nav class="navbar">
    <a href="feed.html" class="navbar-brand">RESPAWN</a>
    <a href="feed.html" class="btn-back">← Volver al feed</a>
  </nav>

  <div class="map-wrapper">
    <div class="map-title">🗺 Mapa de Aventura</div>

    <canvas id="game-map" width="920" height="380"></canvas>

    <div class="map-hud">
      <div id="map-instructions">Usá las flechas para moverte · <span class="kbd">Enter</span> para entrar al nivel</div>
    </div>

    <div class="level-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00FFF7;"></div>Snake</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF4F7B;"></div>Pong</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C084FC;"></div>Breakout</div>
      <div class="legend-item"><div class="legend-dot" style="background:#444; border: 1px solid #666;"></div>Bloqueado</div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js?v=3"></script>
  <script src="gamemap.js"></script>
  <script src="touch-controls.js"></script>
</body>
</html>
