<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Respawn — Explorar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { min-height: 100vh; }
    .explore-page { max-width: 1100px; margin: 0 auto 80px; padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; }

    /* ── Hero search ── */
    .explore-hero {
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-xl); padding: 40px 32px;
      text-align: center; position: relative; overflow: hidden;
    }
    .explore-hero::before { content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,247,0.04) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 80% 100% at 50% 0%,black,transparent); }
    .explore-hero-title { font-family:var(--font-display);font-size:28px;font-weight:900;color:var(--text-primary);letter-spacing:2px;margin-bottom:8px;position:relative; }
    .explore-hero-title span { color:var(--cyan); }
    .explore-hero-sub { font-family:var(--font-mono);font-size:13px;color:var(--text-muted);margin-bottom:28px;position:relative; }

    .search-bar { display:flex;align-items:center;gap:0;max-width:560px;margin:0 auto;position:relative; }
    .search-input { flex:1;padding:14px 20px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg) 0 0 var(--radius-lg);color:var(--text-primary);font-family:var(--font-mono);font-size:14px;outline:none;transition:border-color 0.2s;border-right:none; }
    .search-input:focus { border-color:var(--cyan); }
    .search-input::placeholder { color:var(--text-muted); }
    .search-btn { padding:14px 24px;background:var(--cyan);color:#000;border:none;border-radius:0 var(--radius-lg) var(--radius-lg) 0;font-family:var(--font-display);font-size:12px;font-weight:900;letter-spacing:1px;cursor:pointer;transition:all 0.2s;white-space:nowrap; }
    .search-btn:hover { background:var(--cyan-dim);box-shadow:0 0 16px var(--cyan-glow-strong); }

    .search-tags { display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;position:relative; }
    .search-tag { font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-muted);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px; }
    .search-tag:hover { color:var(--cyan);border-color:var(--cyan);background:rgba(0,255,247,0.06); }

    /* ── Grid 3 cols ── */
    .explore-grid { display:grid;grid-template-columns:1fr 1fr 320px;gap:20px;align-items:start; }

    /* ── Section card ── */
    .section-card { background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden; }
    .section-card-hd { padding:16px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between; }
    .section-card-title { font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase; }
    .section-card-body  { padding:16px 20px; }

    /* ── User cards ── */
    .user-card { display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-subtle);transition:background 0.15s; }
    .user-card:last-child { border-bottom:none;padding-bottom:0; }
    .user-card-av-wrap { position:relative;flex-shrink:0; }
    .user-card-av { width:46px;height:46px;border-radius:10px;image-rendering:pixelated;border:2px solid var(--border-default);display:block;transition:border-color 0.2s; }
    .user-card-av:hover { border-color:var(--cyan); }
    .user-card-online { position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#4ade80;border:2px solid var(--bg-card);box-shadow:0 0 6px #4ade80; }
    .user-card-info { flex:1;min-width:0; }
    .user-card-name { font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-primary);letter-spacing:0.5px;margin-bottom:2px; }
    .user-card-bio  { font-family:var(--font-body);font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px; }
    .user-card-games { display:flex;gap:4px;flex-wrap:wrap; }
    .user-card-game-tag { font-family:var(--font-display);font-size:9px;font-weight:700;color:var(--purple);background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.2);border-radius:20px;padding:1px 7px; }
    .btn-follow-card { padding:6px 14px;font-size:10px;margin:0;white-space:nowrap;letter-spacing:0.5px;flex-shrink:0; }
    .btn-unfollow-card { padding:6px 14px;font-size:10px;margin:0;background:transparent;border:1px solid var(--purple-dim);color:var(--purple);border-radius:var(--radius-md);font-family:var(--font-display);font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0; }
    .btn-unfollow-card:hover { background:var(--purple-glow); }

    /* ── Post cards en explore ── */
    .explore-post { padding:14px 0;border-bottom:1px solid var(--border-subtle); }
    .explore-post:last-child { border-bottom:none;padding-bottom:0; }
    .explore-post-header { display:flex;align-items:center;gap:8px;margin-bottom:6px; }
    .explore-post-av { width:30px;height:30px;border-radius:7px;image-rendering:pixelated;border:1px solid var(--border-default); }
    .explore-post-author { font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--text-primary);letter-spacing:0.5px; }
    .explore-post-date { font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-left:auto; }
    .explore-post-content { font-family:var(--font-body);font-size:14px;color:var(--text-primary);line-height:1.5;margin-bottom:6px; }
    .explore-post-meta { font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;gap:14px; }
    .explore-post-meta span { display:flex;align-items:center;gap:4px; }

    /* ── Trending games ── */
    .trending-game { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-subtle); }
    .trending-game:last-child { border-bottom:none;padding-bottom:0; }
    .trending-game-rank { font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--text-muted);width:24px;text-align:center;flex-shrink:0; }
    .trending-game-rank.top { color:var(--cyan); }
    .trending-game-icon { font-size:28px;flex-shrink:0; }
    .trending-game-info { flex:1; }
    .trending-game-name  { font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-primary);letter-spacing:0.5px;margin-bottom:2px; }
    .trending-game-count { font-family:var(--font-mono);font-size:11px;color:var(--text-muted); }
    .trending-game-bar { width:60px;height:4px;background:var(--bg-surface);border-radius:2px;overflow:hidden; }
    .trending-game-fill { height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--purple-dim));border-radius:2px; }

    /* ── Search results ── */
    #searchResults { display:none; }
    #searchResults.visible { display:block; }
    .no-results { text-align:center;padding:40px;font-family:var(--font-mono);font-size:13px;color:var(--text-muted); }

    @media(max-width:900px) { .explore-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <nav id="globalNav"></nav>

  <div class="explore-page">

    <!-- Hero search -->
    <div class="explore-hero">
      <div class="explore-hero-title">Explorá <span>Respawn</span></div>
      <div class="explore-hero-sub">Descubrí gamers, posts y tendencias de la comunidad</div>
      <div class="search-bar">
        <input class="search-input" id="searchInput" placeholder="Buscar usuarios, juegos, posts..." oninput="liveSearch(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-btn" onclick="doSearch()">BUSCAR</button>
      </div>
      <div class="search-tags" id="quickTags"></div>
    </div>

    <!-- Resultados de búsqueda -->
    <div id="searchResults">
      <div class="section-card">
        <div class="section-card-hd">
          <span class="section-card-title" id="searchResultsTitle">Resultados</span>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);cursor:pointer;" onclick="clearSearch()">✕ Limpiar</span>
        </div>
        <div class="section-card-body" id="searchResultsBody"></div>
      </div>
    </div>

    <!-- Grid principal -->
    <div class="explore-grid" id="mainExplore">

      <!-- Jugadores destacados -->
      <div class="section-card">
        <div class="section-card-hd">
          <span class="section-card-title">👾 Gamers destacados</span>
          <span id="userCountLabel" style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);"></span>
        </div>
        <div class="section-card-body" id="featuredUsers"></div>
      </div>

      <!-- Posts recientes de la comunidad -->
      <div class="section-card">
        <div class="section-card-hd">
          <span class="section-card-title">📡 Posts recientes</span>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--cyan);">En vivo</span>
        </div>
        <div class="section-card-body" id="recentPosts"></div>
      </div>

      <!-- Sidebar derecho -->
      <div style="display:flex;flex-direction:column;gap:16px;">

        <!-- Trending games -->
        <div class="section-card">
          <div class="section-card-hd"><span class="section-card-title">🔥 Juegos trending</span></div>
          <div class="section-card-body" id="trendingGames"></div>
        </div>

        <!-- Stats comunidad -->
        <div class="section-card">
          <div class="section-card-hd"><span class="section-card-title">📊 Comunidad</span></div>
          <div class="section-card-body" id="communityStats"></div>
        </div>

        <!-- Nuevos usuarios -->
        <div class="section-card">
          <div class="section-card-hd"><span class="section-card-title">✨ Recién llegados</span></div>
          <div class="section-card-body" id="newUsers"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js?v=3"></script>
  <script src="navbar.js"></script>
  <script src="explore.js"></script>
</body>
</html>
