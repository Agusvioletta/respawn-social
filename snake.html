<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Respawn — Snake</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .navbar { position:sticky; top:0; z-index:100; background:rgba(7,7,15,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border-subtle); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; }
    .navbar-brand { font-family:var(--font-display); font-size:18px; font-weight:900; color:var(--cyan); letter-spacing:2px; text-decoration:none; text-shadow:0 0 12px rgba(0,255,247,0.5); }
    .btn-back { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:transparent; border:1px solid var(--border-default); color:var(--text-secondary); border-radius:var(--radius-md); font-family:var(--font-display); font-size:11px; font-weight:700; letter-spacing:1px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
    .btn-back:hover { border-color:var(--cyan); color:var(--cyan); }

    .game-wrapper { max-width: 480px; margin: 32px auto 60px; padding: 0 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .game-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--cyan); letter-spacing: 3px; text-shadow: 0 0 20px var(--cyan); text-align: center; }

    .game-hud {
      width: 400px; display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 10px 16px;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .hud-label { font-family: var(--font-display); font-size: 9px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
    .hud-value { font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--cyan); }
    .hud-value.goal { color: var(--purple); }

    #game-board {
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      box-shadow: 0 0 32px var(--cyan-glow), 0 0 0 1px var(--border-subtle);
      display: block;
    }

    .game-controls {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
      text-align: center; line-height: 1.8;
    }

    /* Overlay de pausa / inicio */
    .game-overlay {
      position: absolute; inset: 0;
      background: rgba(7,7,15,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; border-radius: var(--radius-md);
      font-family: var(--font-display);
    }
    .overlay-title { font-size: 20px; font-weight: 900; color: var(--cyan); letter-spacing: 2px; }
    .overlay-sub { font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); }

    .canvas-wrap { position: relative; }
    @media (max-width: 600px) {
    .game-wrapper { padding: 0 8px 180px; margin: 12px auto; }
    canvas { width: 100% !important; height: auto !important; border-radius: 8px; }
    .game-hud { flex-wrap: wrap; gap: 8px; font-size: 11px; }
  }
</style>
</head>
<body>
  <nav class="navbar">
    <a href="feed.html" class="navbar-brand">RESPAWN</a>
    <a href="gamemap.html" class="btn-back">← Mapa</a>
  </nav>

  <div class="game-wrapper">
    <div class="game-title">🐍 SNAKE</div>

    <div class="game-hud">
      <div class="hud-item">
        <span class="hud-label">Puntaje</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Meta</span>
        <span class="hud-value goal">10</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Nivel</span>
        <span class="hud-value" id="currentLevel">1</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game-board" width="400" height="400"></canvas>
      <div class="game-overlay" id="overlay">
        <div class="overlay-title">SNAKE</div>
        <div class="overlay-sub">Presioná cualquier tecla para empezar</div>
      </div>
    </div>

    <div class="game-controls">
      ↑ ↓ ← → para moverse &nbsp;·&nbsp; Llegá a 10 puntos para avanzar
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js?v=3"></script>
  <script src="snake.js"></script>
  <script src="touch-controls.js"></script>
</body>
</html>
