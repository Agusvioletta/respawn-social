<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Respawn — Tetris</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .navbar { position:sticky;top:0;z-index:100;background:rgba(7,7,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-subtle);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px; }
    .navbar-brand { font-family:var(--font-display);font-size:18px;font-weight:900;color:var(--cyan);letter-spacing:2px;text-decoration:none; }
    .btn-back { padding:6px 14px;background:transparent;border:1px solid var(--border-default);color:var(--text-secondary);border-radius:var(--radius-md);font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;text-decoration:none;transition:all 0.2s; }
    .btn-back:hover { border-color:var(--cyan);color:var(--cyan); }

    .game-wrapper { max-width:640px;margin:32px auto 60px;padding:0 16px;display:flex;flex-direction:column;align-items:center;gap:16px; }
    .game-title { font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--purple);letter-spacing:3px;text-shadow:0 0 20px var(--purple); }

    .tetris-layout { display:flex;gap:16px;align-items:flex-start; }

    .game-hud-side { width:120px;display:flex;flex-direction:column;gap:12px; }
    .hud-box { background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:12px; }
    .hud-label { font-family:var(--font-display);font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px; }
    .hud-value { font-family:var(--font-display);font-size:18px;font-weight:900;color:var(--cyan); }
    #nextCanvas { display:block;margin:4px auto 0; }

    #tetris-board { border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:0 0 32px var(--purple-glow),0 0 0 1px var(--border-subtle);display:block; }

    .canvas-wrap { position:relative; }
    .game-overlay { position:absolute;inset:0;background:rgba(7,7,15,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:var(--radius-md); }

    .game-controls { font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:center;line-height:1.8; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="feed.html" class="navbar-brand">RESPAWN</a>
    <a href="gamemap.html" class="btn-back">← Mapa</a>
  </nav>

  <div class="game-wrapper">
    <div class="game-title">🟪 TETRIS</div>
    <div class="tetris-layout">

      <div class="canvas-wrap">
        <canvas id="tetris-board" width="240" height="480"></canvas>
        <div class="game-overlay" id="overlay">
          <div style="font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--purple);letter-spacing:2px;">TETRIS</div>
          <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);">Presioná cualquier tecla para empezar</div>
        </div>
      </div>

      <div class="game-hud-side">
        <div class="hud-box">
          <div class="hud-label">Score</div>
          <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Nivel</div>
          <div class="hud-value" id="level">1</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Líneas</div>
          <div class="hud-value" id="lines">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Siguiente</div>
          <canvas id="nextCanvas" width="80" height="80"></canvas>
        </div>
      </div>
    </div>
    <div class="game-controls">← → mover &nbsp;·&nbsp; ↑ rotar &nbsp;·&nbsp; ↓ bajar &nbsp;·&nbsp; Espacio caída rápida</div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js?v=3"></script>
  <script src="tetris.js"></script>
</body>
</html>
