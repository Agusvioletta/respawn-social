<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Respawn — Mensajes</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .messages-page { max-width:1100px;margin:0 auto 80px;padding:24px 16px;display:grid;grid-template-columns:320px 1fr;gap:16px;height:calc(100vh - 100px); }
    @media(max-width:768px) {
      .messages-page { grid-template-columns:1fr; height:auto; padding:8px; gap:0; }
      .conv-sidebar { width:100%; }
      .chat-panel { height:calc(100vh - 130px); }
      .messages-page.chat-open .conv-sidebar { display:none; }
      .messages-page:not(.chat-open) .chat-panel { display:none; }
      .mobile-back-btn { display:flex !important; align-items:center; gap:8px; font-family:var(--font-display); font-size:11px; font-weight:700; color:var(--text-muted); background:none; border:none; cursor:pointer; padding:8px 0; }
    }
    @media(min-width:769px) { .mobile-back-btn { display:none !important; } }

    /* ── Sidebar de conversaciones ── */
    .conversations-panel { background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden; }
    .conv-header { padding:16px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
    .conv-title { font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-primary);letter-spacing:2px;text-transform:uppercase; }
    .conv-new-btn { width:28px;height:28px;border-radius:50%;background:var(--cyan);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;transition:all 0.2s;flex-shrink:0; }
    .conv-new-btn:hover { box-shadow:0 0 12px var(--cyan-glow-strong);transform:scale(1.1); }

    .conv-search { padding:10px 16px;border-bottom:1px solid var(--border-subtle);flex-shrink:0; }
    .conv-search input { width:100%;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-family:var(--font-mono);font-size:12px;outline:none;transition:border-color 0.2s; }
    .conv-search input:focus { border-color:var(--cyan); }
    .conv-search input::placeholder { color:var(--text-muted); }

    .conv-list { flex:1;overflow-y:auto; }
    .conv-item { display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--border-subtle);position:relative; }
    .conv-item:hover { background:var(--bg-elevated); }
    .conv-item.active { background:rgba(0,255,247,0.06);border-left:3px solid var(--cyan); }
    .conv-item.active .conv-item-name { color:var(--cyan); }
    .conv-av-wrap { position:relative;flex-shrink:0; }
    .conv-av { width:42px;height:42px;border-radius:10px;image-rendering:pixelated;border:2px solid var(--border-default);display:block; }
    .conv-online-dot { position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#4ade80;border:2px solid var(--bg-card);box-shadow:0 0 6px #4ade80; }
    .conv-info { flex:1;min-width:0; }
    .conv-item-name { font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-primary);letter-spacing:0.5px;margin-bottom:3px; }
    .conv-item-last { font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .conv-meta { display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0; }
    .conv-time { font-family:var(--font-mono);font-size:10px;color:var(--text-muted); }
    .conv-unread { width:18px;height:18px;background:var(--cyan);border-radius:50%;font-family:var(--font-display);font-size:9px;font-weight:900;color:#000;display:flex;align-items:center;justify-content:center; }

    /* ── Chat panel ── */
    .chat-panel { background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden; }

    .chat-header { padding:14px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg-elevated); }
    .chat-header-av { width:38px;height:38px;border-radius:9px;image-rendering:pixelated;border:2px solid var(--cyan-dim); }
    .chat-header-info { flex:1; }
    .chat-header-name { font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text-primary);letter-spacing:0.5px; }
    .chat-header-status { font-family:var(--font-mono);font-size:11px;color:#4ade80;margin-top:1px; }
    .chat-header-actions { display:flex;gap:8px; }
    .chat-action-btn { width:32px;height:32px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border-default);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s; }
    .chat-action-btn:hover { border-color:var(--cyan);color:var(--cyan); }

    .chat-messages { flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px; }

    .msg-group { display:flex;gap:10px;align-items:flex-end; }
    .msg-group.mine { flex-direction:row-reverse; }
    .msg-av { width:30px;height:30px;border-radius:7px;image-rendering:pixelated;border:1px solid var(--border-default);flex-shrink:0; }
    .msg-bubbles { display:flex;flex-direction:column;gap:3px;max-width:70%; }
    .msg-group.mine .msg-bubbles { align-items:flex-end; }

    .msg-bubble { padding:9px 14px;border-radius:14px;font-family:var(--font-body);font-size:14px;line-height:1.5;word-break:break-word;position:relative; }
    .msg-bubble.theirs { background:var(--bg-elevated);border:1px solid var(--border-default);color:var(--text-primary);border-bottom-left-radius:4px; }
    .msg-bubble.mine { background:linear-gradient(135deg,var(--cyan-dim),rgba(0,200,194,0.8));color:#000;font-weight:600;border-bottom-right-radius:4px; }

    .msg-meta { font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:0 4px;margin-top:1px; }
    .msg-group.mine .msg-meta { text-align:right; }

    /* System message */
    .msg-system { text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:4px 0; }

    /* Typing indicator */
    .typing-indicator { display:none;gap:4px;align-items:center;padding:0 4px; }
    .typing-dot { width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:typingdot 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes typingdot { 0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-4px);opacity:1} }

    /* Input area */
    .chat-input-area { padding:14px 16px;border-top:1px solid var(--border-subtle);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;background:var(--bg-elevated); }
    .chat-input-wrap { flex:1;position:relative; }
    .chat-input { width:100%;padding:10px 14px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;resize:none;transition:border-color 0.2s;min-height:42px;max-height:120px;line-height:1.5; }
    .chat-input:focus { border-color:var(--cyan); }
    .chat-input::placeholder { color:var(--text-muted); }
    .chat-emoji-btn { position:absolute;right:10px;bottom:10px;background:none;border:none;font-size:18px;cursor:pointer;opacity:0.5;transition:opacity 0.2s; }
    .chat-emoji-btn:hover { opacity:1; }
    .chat-send-btn { width:42px;height:42px;border-radius:50%;background:var(--cyan);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all 0.2s; }
    .chat-send-btn:hover { box-shadow:0 0 14px var(--cyan-glow-strong);transform:scale(1.05); }

    /* Empty states */
    .chat-empty { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px; }
    .chat-empty-icon { font-size:48px;opacity:0.3; }
    .chat-empty-title { font-family:var(--font-display);font-size:14px;color:var(--text-secondary);letter-spacing:1px; }
    .chat-empty-sub { font-family:var(--font-mono);font-size:12px;color:var(--text-muted); }

    /* New conversation modal */
    .new-conv-modal { position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px); }
    .new-conv-modal.open { display:flex; }
    .new-conv-box { background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:420px;margin:16px; }
    .new-conv-box h3 { font-family:var(--font-display);font-size:14px;color:var(--cyan);letter-spacing:2px;margin-bottom:16px; }
    .user-pick { display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:background 0.15s;border:1px solid transparent; }
    .user-pick:hover { background:var(--bg-elevated);border-color:var(--border-default); }
    .user-pick.selected { background:rgba(0,255,247,0.08);border-color:var(--cyan); }
    .user-pick-av { width:36px;height:36px;border-radius:8px;image-rendering:pixelated;border:1px solid var(--border-default); }
    .user-pick-name { font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-primary); }
    .user-pick-bio  { font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:1px; }

    /* Emoji picker */
    .emoji-picker { position:absolute;bottom:50px;right:0;background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:10px;display:none;grid-template-columns:repeat(8,1fr);gap:4px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,0.6); }
    .emoji-picker.open { display:grid; }
    .emoji-pick-btn { width:30px;height:30px;border:none;background:transparent;cursor:pointer;font-size:18px;border-radius:6px;transition:background 0.15s;display:flex;align-items:center;justify-content:center; }
    .emoji-pick-btn:hover { background:var(--bg-elevated); }

  </style>
</head>
<body>
  <nav id="globalNav"></nav>

  <div class="new-conv-modal" id="newConvModal">
    <div class="new-conv-box">
      <h3>💬 NUEVO MENSAJE</h3>
      <input id="newConvSearch" placeholder="Buscar usuario..." style="width:100%;padding:9px 12px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:none;margin-bottom:12px;" oninput="filterNewConvUsers(this.value)">
      <div id="newConvUserList" style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button onclick="closeNewConv()" style="flex:1;padding:10px;background:transparent;border:1px solid var(--border-default);color:var(--text-muted);border-radius:var(--radius-md);font-family:var(--font-display);font-size:11px;font-weight:700;cursor:pointer;">CANCELAR</button>
      </div>
    </div>
  </div>

  <div class="messages-page">
    <div class="conversations-panel">
      <div class="conv-header">
        <span class="conv-title">💬 Mensajes</span>
        <button class="conv-new-btn" onclick="openNewConv()" title="Nueva conversación">+</button>
      </div>
      <div class="conv-search"><input id="convSearchInput" placeholder="Buscar conversación..." oninput="filterConvs(this.value)"></div>
      <div class="conv-list" id="convList"></div>
    </div>

    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-title">SIN MENSAJES ABIERTOS</div>
        <div class="chat-empty-sub">Seleccioná una conversación o empezá una nueva</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js?v=3"></script>
  <script src="navbar.js"></script>
  <script src="messages.js"></script>
</body>
</html>
